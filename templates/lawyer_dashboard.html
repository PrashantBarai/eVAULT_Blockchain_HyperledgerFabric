<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-blue-900 to-blue-600 text-white p-4 flex justify-between items-center">
        <div class="flex space-x-6">
            <a href="/lawyer/{{user._id}}" class="hover:text-gray-300 transition duration-300">Home</a>
            <a href="/lawyer/mycases/{{user._id}}" class="hover:text-gray-300 transition duration-300">My Cases</a>
            <a href="/lawyer/availableregistrar" class="hover:text-gray-300 transition duration-300">Available Registrars</a>
        </div>
        <a href="/logout" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600 transition duration-300">Logout</a>
    </nav>

    <div class="container mx-auto p-6">
        <h2 class="text-3xl font-bold text-gray-800">Welcome to the Lawyer Dashboard</h2>
        <p class="text-gray-600">Manage your cases efficiently.</p>
    
        <h3 class="text-2xl font-semibold mt-6">My Cases</h3>
        <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6 mt-4">
            {% if cases %}
                {% for case in cases %}
                <div class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition-transform transform hover:scale-105 duration-300">
                    <a href="/posts/{{ case._id }}" class="text-xl font-semibold text-blue-900 hover:underline">
                        {{ case.title }}
                    </a>
                    <p class="text-sm font-medium text-orange-500 mt-2"><strong>Type:</strong> {{ case.case_type | capitalize }}</p>
                    <p class="text-gray-700 mt-3">{{ case.content }}</p>
                    
                    <!-- Send to Registrar Button -->
                    <form action="/send-to-registrar/{{ case._id }}" method="post" class="mt-4">
                        <button type="submit" 
                            onclick="return confirm('Are you sure you want to send this case to the registrar?');" 
                            class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition duration-300">
                            Send to Registrar
                        </button>
                    </form>
                </div>
                {% endfor %}
            {% else %}
                <p class="text-gray-500">No Cases</p>
            {% endif %}
        </div>
    </div>
    

    <!-- Floating Upload Button -->
    <button class="fixed bottom-6 right-6 bg-orange-500 text-white p-5 rounded-full shadow-lg text-xl hover:bg-orange-600 transition-transform transform hover:scale-110 duration-300"
        onclick="togglePopup()">+</button>

    <!-- Pop-up Form -->
    <div id="caseForm" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg w-96 transform transition-all scale-95">
            <h2 class="text-2xl font-bold text-gray-800">Upload Case</h2>
            <form action="/lawyer/{{user._id}}" method="post" enctype="multipart/form-data" class="mt-4 space-y-4">
                <input type="text" name="title" placeholder="Case Title" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
                <textarea name="content" placeholder="Case Details" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300"></textarea>
                <select name="case_type" required class="w-full p-2 border border-gray-300 rounded-lg">
                    <option value="criminal">Criminal</option>
                    <option value="civil">Civil</option>
                    <option value="family">Family</option>
                    <option value="corporate">Corporate</option>
                    <option value="intellectual">Intellectual Property</option>
                    <option value="cybercrime">Cybercrime</option>
                </select>
                <input type="file" name="file" required class="w-full p-2 border border-gray-300 rounded-lg">
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-300">Submit</button>
            </form>
            <button onclick="togglePopup()" class="mt-4 text-gray-500 hover:text-gray-700 transition">Cancel</button>
        </div>
    </div>

    <script>
        
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
          
        function togglePopup() {
            var form = document.getElementById("caseForm");
            form.classList.toggle("hidden");
            form.classList.toggle("flex");
        }
    </script>

</body>
</html>
