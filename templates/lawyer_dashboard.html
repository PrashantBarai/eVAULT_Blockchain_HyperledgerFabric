<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lawyer Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <nav class="bg-gradient-to-r from-blue-900 to-blue-600 text-white p-4 flex justify-between items-center">
        <div class="flex space-x-6">
            <a href="/lawyer/{{user._id}}" class="hover:text-gray-300 transition duration-300">Home</a>
            <a href="/lawyer/mycases/{{user._id}}" class="hover:text-gray-300 transition duration-300">My Cases</a>
            <a href="/lawyer/availableregistrar" class="hover:text-gray-300 transition duration-300">Available Registrars</a>
        </div>
        <a href="/logout" class="bg-red-500 px-4 py-2 rounded-lg hover:bg-red-600 transition duration-300">Logout</a>
    </nav>

    <div class="container mx-auto p-6">
        <h2 class="text-3xl font-bold text-gray-800">Welcome to the Lawyer Dashboard</h2>
        <p class="text-gray-600">Manage your cases efficiently.</p>

        <input type="text" id="search" placeholder="Search by title..." class="mt-4 w-full p-2 border border-gray-300 rounded-lg" onkeyup="filterCases()">
    
        <h3 class="text-2xl font-semibold mt-6">My Cases</h3>
        <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6 mt-4" id="caseList">
            {% if cases %}
                {% for case in cases %}
                <div class="case-item bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition-transform transform hover:scale-105 duration-300">
                    <a href="/posts/{{ case._id }}" class="text-xl font-semibold text-blue-900 hover:underline">
                        {{ case.title }}
                    </a>
                    <p class="text-sm font-medium text-orange-500 mt-2"><strong>Type:</strong> {{ case.case_type | capitalize }}</p>
                    <p class="text-gray-700 mt-3">{{ case.content }}</p>
                    <form action="/send-to-registrar/{{ case._id }}" method="post" class="mt-4">
                        <button type="submit" onclick="return confirm('Are you sure you want to send this case to the registrar?');" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition duration-300">
                            Send to Registrar
                        </button>
                    </form>
                </div>
                {% endfor %}
            {% else %}
                <p class="text-gray-500">No Cases</p>
            {% endif %}
        </div>
    </div>
    
    <button class="fixed bottom-6 right-6 bg-orange-500 text-white p-5 rounded-full shadow-lg text-xl hover:bg-orange-600 transition-transform transform hover:scale-110 duration-300" onclick="togglePopup()">+</button>

    <div id="caseForm" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center hidden">
        <div class="bg-white p-6 rounded-lg shadow-lg w-full max-w-md transform transition-all scale-95">
            <h2 class="text-2xl font-bold text-gray-800 text-center">Upload Case</h2>
            <form action="/lawyer/{{user._id}}" method="post" enctype="multipart/form-data" class="mt-4 space-y-4">
                <input type="text" name="title" placeholder="Case Title" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
                <textarea name="content" placeholder="Case Details" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300"></textarea>
    
                <select name="case_type" required class="w-full p-2 border border-gray-300 rounded-lg">
                    <option value="criminal">Criminal</option>
                    <option value="civil">Civil</option>
                    <option value="family">Family</option>
                    <option value="corporate">Corporate</option>
                    <option value="intellectual">Intellectual Property</option>
                    <option value="cybercrime">Cybercrime</option>
                </select>
    
                <input type="text" name="party1_uid" placeholder="Party 1 UID" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
                <input type="text" name="party2_uid" placeholder="Party 2 UID" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
    
                <label class="text-gray-700 font-semibold">Date of Filing:</label>
                <input type="date" name="date_of_filing" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
    
                <label class="text-gray-700 font-semibold">Last Updated On:</label>
                <input type="date" name="updated_on" required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
    
                <label class="text-gray-700 font-semibold">Upload Case Files:</label>
                <input type="file" name="files" id="fileInput" multiple required class="w-full p-2 border border-gray-300 rounded-lg focus:ring focus:ring-blue-300">
                <p id="fileList" class="text-sm text-gray-600 mt-2"></p>
    
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-300">
                    Submit
                </button>
            </form>
            <button onclick="togglePopup()" class="mt-4 text-gray-500 hover:text-gray-700 transition block mx-auto">Cancel</button>
        </div>
    </div>
    

    <script>
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
        document.getElementById("fileInput").addEventListener("change", function() {
            let files = this.files;
            console.log(`Selected ${files.length} files`);
            for (let i = 0; i < files.length; i++) {
                console.log(`File ${i + 1}: ${files[i].name}`);
            }
        });
        function previewFiles() {
            let fileInput = document.getElementById("fileInput");
            let fileList = document.getElementById("fileList");
            fileList.innerHTML = "";  
    
            if (fileInput.files.length > 0) {
                let fileNames = Array.from(fileInput.files).map(file => file.name).join("<br>");
                fileList.innerHTML = `<strong>Selected Files:</strong><br>${fileNames}`;
            }
        }
        
        function togglePopup() {
            var form = document.getElementById("caseForm");
            form.classList.toggle("hidden");
            form.classList.toggle("flex");
        }

        function filterCases() {
            let input = document.getElementById("search").value.toLowerCase();
            let cases = document.getElementsByClassName("case-item");
            
            Array.from(cases).forEach((caseItem) => {
                let title = caseItem.getElementsByTagName("a")[0].textContent.toLowerCase();
                caseItem.style.display = title.includes(input) ? "block" : "none";
            });
        }
    </script>

</body>
</html>
