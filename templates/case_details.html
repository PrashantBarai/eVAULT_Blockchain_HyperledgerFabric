<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ case.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

    <a href="/lawyer/{{ case.user_id }}" class="text-blue-600 hover:underline">← Back to Dashboard</a>

    <div class="bg-white p-6 mt-4 rounded-lg shadow-lg">
        <h1 class="text-3xl font-bold text-gray-800">{{ case.title }}</h1>
        <p class="text-sm font-medium text-orange-500 mt-2"><strong>Type:</strong> {{ case.case_type | capitalize }}</p>
        <p class="text-gray-700 mt-4">{{ case.content }}</p>

        {% if case.file %}
            <p class="mt-4"><strong>Document:</strong> 
                <a href="https://gateway.pinata.cloud/ipfs/{{ case.file }}" target="_blank" 
                   class="text-blue-600 hover:underline">View File</a>
            </p>
        {% endif %}
    </div>

</body>
</html>
