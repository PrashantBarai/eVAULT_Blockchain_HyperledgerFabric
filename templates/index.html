<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Document eVault</title>
    <style>
        /* Global Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* Gradient Background */
        body {
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            width: 100%;
            position: absolute;
            top: 0;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        /* Content Container */
        .container {
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.2);
            margin-top: 80px;
        }

        /* Headings */
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        /* Button Styles */
        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: #ff9800;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            background: #e68900;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="navbar">Legal Document eVault</div>

    <div class="container">
        <h1>Securely Store Your Legal Documents</h1>
        <p>Upload, verify, and retrieve legal documents with blockchain security.</p>

        <a href="/signup" class="btn">Get started</a>
        <a href="/login" class="btn">Login</a>
    </div>

</body>
</html>
